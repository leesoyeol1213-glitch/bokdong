name: Build Android APK

# 로컬 안드로이드 도구 없이 클라우드(무료 ubuntu 러너)에서 디버그 APK 빌드.
# 실행: GitHub → Actions → "Build Android APK" → Run workflow. 끝나면 Artifacts에서 APK 다운로드 → 폰에 설치.
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'assets/**'
      - 'index.html'
      - 'manifest.json'
      - 'sw.js'
      - 'privacy.html'
      - 'android/**'
      - 'capacitor.config.json'
      - 'build-www.js'
      - 'package.json'
      - '.github/workflows/android-build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'   # Capacitor 최신 CLI가 Node >=22 요구 (로컬과 동일한 24로 고정)

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'   # Capacitor 7 안드로이드 라이브러리가 JDK 21 요구(source release 21)

      - name: Show tool versions
        run: node -v && npm -v && java -version

      - name: Install npm deps
        run: npm ci || npm install

      - name: Build web bundle (www)
        run: node build-www.js

      - name: Capacitor sync (android)
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bokdong-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
