name: Build Android Release (AAB)

# Play Console 업로드용 서명된 릴리스 AAB(Android App Bundle) 빌드.
# 실행: GitHub → Actions → "Build Android Release (AAB)" → Run workflow.
# 끝나면 Artifacts에서 app-release.aab 다운로드 → Play Console에 업로드.
#
# 필요한 GitHub Secrets (Settings → Secrets and variables → Actions):
#   BOKDONG_KEYSTORE_BASE64   : 업로드 키스토어(.jks)를 base64로 인코딩한 문자열
#   BOKDONG_KEYSTORE_PASSWORD : 키스토어 비밀번호
#   BOKDONG_KEY_ALIAS         : 키 별칭(alias)
#   BOKDONG_KEY_PASSWORD      : 키 비밀번호
# (키스토어 생성/인코딩 방법은 PLAY_출시가이드.md 참고. 키스토어 원본은 절대 커밋 금지.)

on:
  workflow_dispatch: {}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install npm deps
        run: npm ci || npm install

      - name: Build web bundle (www)
        run: node build-www.js

      - name: Capacitor sync (android)
        run: npx cap sync android

      - name: Decode upload keystore
        env:
          KEYSTORE_B64: ${{ secrets.BOKDONG_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::error::BOKDONG_KEYSTORE_BASE64 secret이 없습니다. PLAY_출시가이드.md의 키스토어 설정을 먼저 완료하세요."
            exit 1
          fi
          echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/upload.jks"
          echo "keystore decoded ($(wc -c < "$RUNNER_TEMP/upload.jks") bytes)"

      - name: Build signed release AAB
        env:
          BOKDONG_KEYSTORE_FILE: ${{ runner.temp }}/upload.jks
          BOKDONG_KEYSTORE_PASSWORD: ${{ secrets.BOKDONG_KEYSTORE_PASSWORD }}
          BOKDONG_KEY_ALIAS: ${{ secrets.BOKDONG_KEY_ALIAS }}
          BOKDONG_KEY_PASSWORD: ${{ secrets.BOKDONG_KEY_PASSWORD }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: bokdong-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
