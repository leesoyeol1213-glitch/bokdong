<body>
<div id="app">
<div class="app-head">
<canvas id="cv" width="420" height="236"></canvas>

<div class="px-panel" style="margin:0 6px 4px;padding:calc(9px * var(--u)) calc(11px * var(--u));">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:calc(6px * var(--u));">
    <div class="panel-title">임복동</div>
    <div style="display:flex;gap:calc(5px * var(--u));">
      <div class="chip">Lv.<span id="lv">1</span></div>
      <div class="chip">₩<span id="mon">800</span></div>
    </div>
  </div>
  <div style="display:flex;gap:calc(5px * var(--u));margin-bottom:calc(6px * var(--u));">
    <div class="chip" style="flex:1;overflow:hidden;">🚴<span id="veh-lbl">세발자전거</span></div>
    <div class="chip" style="flex:1;">📍<span id="loc-lbl">충주</span></div>
    <div class="chip">🍎<span id="apN">3</span> 🧃<span id="jcN">2</span></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:calc(6px * var(--u));">
    <div><div class="mini-lbl">체력</div><div class="px-bar-bg"><div class="px-bar-fill" id="hp-b" style="width:100%;background:#ef4444;"></div></div><div class="mini-val" id="hp-v">100/100</div></div>
    <div><div class="mini-lbl">경험치</div><div class="px-bar-bg"><div class="px-bar-fill" id="xp-b" style="width:0%;background:#a78bfa;"></div></div><div class="mini-val" id="xp-v">0/100</div></div>
    <div><div class="mini-lbl" style="color:#fb923c;">부스터</div><div class="px-bar-bg"><div class="px-bar-fill" id="dop-b" style="width:0%;background:#fb923c;"></div></div><div class="mini-val" id="dop-v">OFF</div></div>
  </div>
</div>

<div class="tab-row">
  <button class="px-tab on" onclick="ST('main')">메인</button>
  <button class="px-tab" onclick="ST('mission')">미션</button>
  <button class="px-tab" onclick="ST('npc')">NPC</button>
  <button class="px-tab" onclick="ST('veh')">탈것</button>
  <button class="px-tab" onclick="ST('gear')">장비</button>
  <button class="px-tab" onclick="ST('item')">아이템</button>
  <button class="px-tab" onclick="ST('codex')">도감</button>
  <button class="px-tab" onclick="ST('stat')">스탯</button>
  <button class="px-tab" onclick="ST('ach')">업적</button>
  <button class="px-tab" onclick="ST('gacha')">가챠</button>
  <button class="px-tab" onclick="ST('postcard')">엽서</button>
  <button class="px-tab" onclick="ST('log')">로그</button>
</div>
</div><!-- /app-head (고정) -->
<div class="app-body">

<div id="tab-main">
  <div class="px-panel">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:calc(5px * var(--u));">
      <div class="panel-title" id="seg-lbl">목적지 없음</div>
      <div class="panel-sub" id="seg-pct">-</div>
    </div>
    <div class="px-bar-bg" style="height:calc(10px * var(--u));margin-bottom:calc(3px * var(--u));"><div class="px-bar-fill" id="seg-b" style="width:0%;background:#38bdf8;"></div></div>
    <div class="panel-sub" id="seg-info">총 0km · 충동적으로 어딜 갈까...</div>
    <div class="divider" style="display:flex;justify-content:space-between;align-items:center;margin-top:calc(6px * var(--u));padding-top:calc(6px * var(--u));">
      <div style="font-size:calc(8px * var(--u));color:var(--ink);">🛣️ 누적 거리</div>
      <div class="big-km" id="total-km">0 km</div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:calc(5px * var(--u));">
      <div class="panel-sub" id="weather-info">☀️ 맑음</div>
      <div class="panel-sub" id="time-info">🌅 아침</div>
    </div>
  </div>
  <div id="course-main" style="margin:0 6px calc(4px * var(--u));"></div>
  <div id="modal-area"></div>
  <div style="padding:0 6px;margin-bottom:calc(5px * var(--u));">
    <button class="px-btn" id="tester-gift-btn" onclick="claimTesterGift()" style="display:none;width:100%;font-size:calc(8px * var(--u));padding:calc(11px * var(--u));background:#7C3AED;border-color:#4C1D95;color:#fff;box-shadow:calc(3px * var(--u)) calc(3px * var(--u)) 0 #2E1065;">🎁 테스터 감사 선물 — 신화 아이템 받기!</button>
    <button class="px-btn" id="mascot-hunt-btn" onclick="huntMascot()" style="display:none;width:100%;font-size:calc(8px * var(--u));padding:calc(11px * var(--u));background:#2E7D32;border-color:#1B5E20;color:#fff;box-shadow:calc(3px * var(--u)) calc(3px * var(--u)) 0 #0D3F12;margin-top:calc(4px * var(--u));">🐾 마스코트 추격!</button>
  </div>
  <div style="padding:0 6px;margin-bottom:calc(5px * var(--u));">
    <button class="px-btn" id="ride-btn" onclick="toggleRide()" style="width:100%;font-size:calc(8px * var(--u));padding:calc(12px * var(--u));">▶ 출발!</button>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:calc(4px * var(--u));padding:0 6px;margin-bottom:calc(4px * var(--u));">
    <button class="px-btn px-btn-sm" id="apple-btn" onclick="appleBtnAction()">🍎<br>사과</button>
    <button class="px-btn px-btn-sm px-btn-orange" onclick="useJuice()">⚡<br>부스터</button>
    <button class="px-btn px-btn-sm" onclick="openFood()">🍜<br>맛집</button>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:calc(4px * var(--u));padding:0 6px;margin-bottom:calc(4px * var(--u));">
    <button class="px-btn px-btn-sm px-btn-gray" id="autoapple-btn" onclick="toggleAutoApple()">🍎 자동 OFF</button>
    <button class="px-btn px-btn-sm px-btn-gray" id="autobuy-btn" onclick="toggleAutoBuyApple()">💳 연료 ON</button>
    <button class="px-btn px-btn-sm px-btn-gray" id="idlemode-btn" onclick="toggleIdleMode()">🎮 방치 ON</button>
  </div>
  <div style="padding:0 6px;margin-bottom:calc(4px * var(--u));">
    <button class="px-btn px-btn-sm px-btn-blue" id="trapDiceBtn" onclick="rollEscapeDice()" style="display:none;width:100%;">🎲 탈출 주사위!</button>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;gap:calc(4px * var(--u));padding:0 6px;margin-bottom:calc(4px * var(--u));">
    <button class="px-btn px-btn-sm" onclick="save()">💾 저장</button>
    <button class="px-btn px-btn-sm" onclick="load()">📂 로드</button>
    <button class="px-btn px-btn-sm px-btn-blue" onclick="openBackup()">🔑 백업</button>
    <button class="px-btn px-btn-sm" id="sound-btn" onclick="toggleSound()">🔊 음향</button>
    <button class="px-btn px-btn-sm px-btn-gray" onclick="resetGame()">↺ 초기화</button>
  </div>
  <div class="panel-sub" style="text-align:center;padding:calc(3px * var(--u));" id="sv-st"></div>
  <div class="quote" style="text-align:center;font-size:calc(7px * var(--u));padding:calc(3px * var(--u));font-style:italic;" id="quote">"갑자기... 그냥 가고 싶어졌어."</div>
</div>

<div id="tab-npc"  style="display:none;padding:0 6px;"><div id="npc-list"></div></div>
<div id="tab-mission" style="display:none;padding:0 6px;"><div id="mission-panel"></div></div>
<div id="tab-codex"   style="display:none;padding:0 6px;"><div id="codex-panel"></div></div>
<div id="tab-veh"  style="display:none;padding:0 6px;"><div id="veh-list"></div></div>
<div id="tab-gear" style="display:none;padding:0 6px;"><div id="gear-panel"></div></div>
<div id="tab-item" style="display:none;padding:0 6px;"><div id="item-panel"></div></div>
<div id="tab-stat" style="display:none;padding:0 6px;"><div id="stat-panel"></div></div>
<div id="tab-ach"  style="display:none;padding:0 6px;"><div id="ach-panel"></div></div>
<div id="tab-gacha" style="display:none;padding:0 6px;"><div id="gacha-panel"></div></div>
<div id="tab-postcard" style="display:none;padding:0 6px;"><div id="postcard-panel"></div></div>
<div id="tab-log"  style="display:none;padding:0 6px;"><div id="ev-log"></div></div>
</div><!-- /app-body (스크롤) -->
</div>

<script src="./src/analytics.js"></script>
<script src="./src/data.js"></script>
<script src="./src/render.js"></script>
<script src="./src/logic.js"></script>
<script src="./src/cloud.js"></script>
<script src="./src/boot.js"></script>

</html>
